# Day 12 Hands-on: Kubernetes Deployment

## Objective
Deploy an Nginx application using a Kubernetes Deployment.

## What I Did

- Created a Deployment YAML
- Applied the Deployment
- Verified the Deployment
- Verified the ReplicaSet
- Verified the Pods

## Commands Used

kubectl apply -f deployment.yaml

kubectl get deployments

kubectl get replicasets

kubectl get pods

## Outcome

Successfully deployed an Nginx Deployment with 3 replicas. Kubernetes automatically created a ReplicaSet and managed the Pods.
